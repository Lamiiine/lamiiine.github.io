        .results {

        .results h2 {

<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Multi-Agent Systems Study Game</h1>
            <p>Master the MAS course with detailed questions</p>
        </div>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-label">Score</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Correct</div>
                <div class="stat-value" id="correct">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Total</div>
                <div class="stat-value" id="total">0</div>
            </div>
        </div>

        <div class="game-area">
            <div class="start-screen" id="startScreen">
                <h2>Choose Your Topic</h2>
                <div class="topic-select">
                    <button class="topic-button" onclick="startGame('all')">🎯 All Topics (Random)</button>
                    <button class="topic-button" onclick="startGame('intro')">📚 Introduction to MAS</button>
                    <button class="topic-button" onclick="startGame('architectures')">🏗️ Agent Architectures</button>
                    <button class="topic-button" onclick="startGame('gametheory')">🎮 Game Theory</button>
                    <button class="topic-button" onclick="startGame('communication')">💬 Communication</button>
                    <button class="topic-button" onclick="startGame('abms')">🔬 Agent-Based Simulation</button>
                    <button class="topic-button" onclick="startGame('planning')">📋 Planning</button>
                    <button class="topic-button" onclick="startGame('coordination')">🤝 Coordination & DPS</button>
                    <button class="topic-button" onclick="startGame('socialchoice')">🗳️ Social Choice Theory</button>
                </div>
            </div>

            <div class="question-area" id="questionArea">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="question-header">
                    <span class="question-number" id="questionNumber"></span>
                    <span style="float: right; color: #6c757d;" id="topicLabel"></span>
                </div>
                <div class="question-text" id="questionText"></div>
                <div class="answers" id="answersArea"></div>
                <div class="feedback" id="feedback">
                    <div id="feedbackText"></div>
                    <div class="explanation" id="explanation"></div>
                </div>
                <button class="next-button" id="nextButton" onclick="nextQuestion()">Next Question →</button>
            </div>

            <div class="results" id="results">
                <h2>Quiz Complete! 🎉</h2>
                <div class="score-display" id="finalScore"></div>
                <p id="resultMessage" style="font-size: 1.2em; color: #6c757d; margin: 20px 0;"></p>
                <button class="restart-button" onclick="location.reload()">Try Again</button>
            </div>
        </div>
    </div>

    <script>
        const questions = {
            intro: [
                {
                    question: "According to Wooldridge (1995), what is the definition of an agent?",
                    answers: [
                        "A program that runs autonomously on a server",
                        "A computer system situated in an environment, capable of autonomous action to meet delegated objectives",
                        "An intelligent software that can communicate with humans",
                        "A robot with sensors and effectors"
                    ],
                    correct: 1,
                    explanation: "Wooldridge (1995) defines an agent as 'a computer system that is situated in some environment, and that is capable of autonomous action in this environment in order to meet its delegated objectives.'"
                },
                {
                    question: "According to Castelfranchi, when is an agent X autonomous with respect to another agent Y for a goal P?",
                    answers: [
                        "When X can perform P faster than Y",
                        "When X can locally decide whether to adopt P or not",
                        "When X does not communicate with Y",
                        "When X has more resources than Y"
                    ],
                    correct: 1,
                    explanation: "Castelfranchi states that an agent X is autonomous wrt Y for P if X can locally decide whether to adopt P or not. Autonomous agent = agent with its own decision process."
                },
                {
                    question: "What are the FOUR key properties of intelligent agents according to the course?",
                    answers: [
                        "Speed, Accuracy, Memory, Processing",
                        "Autonomy, Reactivity, Proactivity, Social ability",
                        "Perception, Action, Learning, Communication",
                        "Beliefs, Desires, Intentions, Plans"
                    ],
                    correct: 1,
                    explanation: "The four key properties are: Autonomy (control over actions and internal state), Reactivity (perceives and reacts to changes), Proactivity (takes initiative, sets goals), and Social ability (interacts with other agents)."
                },
                {
                    question: "What is the difference between an accessible and an inaccessible environment?",
                    answers: [
                        "Accessible means the agent can physically reach it",
                        "Accessible means all aspects relevant to decision making are available to sensors",
                        "Accessible means the environment is deterministic",
                        "Accessible means other agents can enter"
                    ],
                    correct: 1,
                    explanation: "An accessible environment means all aspects relevant to decision making are accessible to the agent's sensors, so no need to maintain internal state. Inaccessible means incomplete information about environment state."
                },
                {
                    question: "In an episodic environment, what is the relationship between episodes?",
                    answers: [
                        "Each episode depends on all previous episodes",
                        "Episodes are independent of each other",
                        "Episodes must be completed in a specific order",
                        "Episodes share the same goal"
                    ],
                    correct: 1,
                    explanation: "In an episodic environment, one episode = perception + action, and episodes are independent. This means agents don't need to think ahead and can make reactive decisions based only on the current episode."
                },
                {
                    question: "What is Expected Utility and how is it calculated?",
                    answers: [
                        "The average of all possible utilities",
                        "The sum of probabilities Pi times utilities Ui for all possible effects",
                        "The maximum utility multiplied by its probability",
                        "The utility divided by the number of actions"
                    ],
                    correct: 1,
                    explanation: "Expected utility ExpU(A) = Σi Pi * Ui, where Pi is the probability of effect i and Ui is its utility. A rational agent should prefer the action with highest expected utility."
                }
            ],
            architectures: [
                {
                    question: "What are the TWO main steps of practical reasoning in BDI agents?",
                    answers: [
                        "Sensing and Acting",
                        "Deliberation (decide what to achieve) and Means-end reasoning (decide how to achieve it)",
                        "Planning and Execution",
                        "Perception and Response"
                    ],
                    correct: 1,
                    explanation: "Practical reasoning consists of: (1) Deliberation - deciding what state of affairs to achieve (outputs intentions), and (2) Means-end reasoning - deciding how to achieve it (outputs plans)."
                },
                {
                    question: "What are the THREE commitment strategies for intention reconsideration in BDI agents?",
                    answers: [
                        "Fast, Medium, Slow",
                        "Blind commitment, Single-minded commitment, Open-minded commitment",
                        "Conservative, Moderate, Aggressive",
                        "Reactive, Proactive, Interactive"
                    ],
                    correct: 1,
                    explanation: "The three strategies are: (1) Blind commitment - only reconsider when all plans fail or after success; (2) Single-minded - also reconsider when intention becomes impossible; (3) Open-minded - uses meta-level controller to decide whether to reconsider."
                },
                {
                    question: "In the BDI architecture, what is the key difference between Desires and Intentions?",
                    answers: [
                        "Desires are stronger than Intentions",
                        "Intentions are consistent and persistent, while Desires can be inconsistent and unrealistic",
                        "Desires are about actions, Intentions are about states",
                        "There is no difference"
                    ],
                    correct: 1,
                    explanation: "Desires can be inconsistent, incompatible, or unrealistic and must be filtered. Intentions are the result of filtering desires - they are consistent, feasible, and persistent (committed to for 'a while')."
                },
                {
                    question: "What is the main limitation of the Subsumption Architecture?",
                    answers: [
                        "It is too complex to implement",
                        "Environment must be accessible and it is not flexible to changing conditions",
                        "It requires too much computational power",
                        "It cannot handle multiple agents"
                    ],
                    correct: 1,
                    explanation: "Main limitations: Environment must be accessible (only considers local info), not flexible (if conditions change, need new rules), no learning (difficult), and hard to build complex agents."
                },
                {
                    question: "In the Subsumption Architecture, how do higher and lower level Competence Modules interact?",
                    answers: [
                        "They operate in sequence",
                        "Lower layers have higher priority and can inhibit higher layers",
                        "Higher layers always override lower layers",
                        "They vote on which action to take"
                    ],
                    correct: 1,
                    explanation: "Lower layers handle basic primitive tasks and have higher priority - they can inhibit higher layers. Higher layers handle more complex patterns. Lower CMs use suppressors (modify inputs) and inhibitors (inhibit outputs) to control higher CMs."
                },
                {
                    question: "What are the pros and cons of BDI architectures compared to reactive architectures?",
                    answers: [
                        "BDI is faster but less flexible",
                        "BDI is grounded in philosophy, flexible, robust but more complex and computationally slower",
                        "BDI works only in static environments",
                        "BDI cannot handle emotions"
                    ],
                    correct: 1,
                    explanation: "BDI pros: grounded in philosophy/logic, high abstraction, explains WHY, extensible, flexible, robust with failure recovery. Cons: more complex, computationally slower than reactive architectures."
                },
                {
                    question: "In a hybrid architecture, what is the difference between horizontal and vertical layering?",
                    answers: [
                        "Horizontal processes data left to right, vertical top to bottom",
                        "Horizontal: each layer connects to sensors/effectors and central control merges suggestions. Vertical: max one layer handles sensors/effectors",
                        "Horizontal is for reactive, vertical is for deliberative",
                        "Horizontal is faster, vertical is more accurate"
                    ],
                    correct: 1,
                    explanation: "Horizontal: each layer directly connected to sensors and effectors, each behaves like an agent producing action suggestions, central control merges them (creates bottleneck). Vertical: sensors/effectors handled by max one layer each, layers communicate with neighbors (not tolerant to layer failures)."
                },
                {
                    question: "What are the main components of the PRS (Procedural Reasoning System) architecture?",
                    answers: [
                        "Sensors, Processors, Actuators, Memory",
                        "Knowledge base (beliefs), Goals (desires), Knowledge Areas (plans), Intentions, Interpreter",
                        "Perception, Reasoning, Action, Learning",
                        "Input, Processing, Output, Feedback"
                    ],
                    correct: 1,
                    explanation: "PRS components: Knowledge base (beliefs about world), Goals (desires to be achieved), Knowledge Areas (plans to achieve goals in specific situations), Intentions (plans selected for execution), Interpreter (inference mechanism)."
                }
            ],
            gametheory: [
                {
                    question: "What is a Nash Equilibrium?",
                    answers: [
                        "When all players get the same payoff",
                        "When no player can improve their payoff by unilaterally changing strategy",
                        "When the sum of payoffs is maximized",
                        "When all players cooperate"
                    ],
                    correct: 1,
                    explanation: "Nash equilibrium is a set of strategies where no player has an interest to deviate alone - each strategy is the best reply to the other. It's an 'absence of regret' situation. Nash theorem: any finite game has at least one Nash equilibrium with mixed strategies."
                },
                {
                    question: "In the Prisoner's Dilemma, what is the relationship between values T, R, P, S?",
                    answers: [
                        "T > R > P > S (Temptation > Reward > Punishment > Sucker)",
                        "R > T > P > S",
                        "T > P > R > S",
                        "All values are equal"
                    ],
                    correct: 0,
                    explanation: "The Prisoner's Dilemma requires T > R > P > S where T=Temptation (unilateral betrayal), R=Reward (mutual cooperation), P=Punishment (mutual betrayal), S=Sucker (unilateral cooperation). This creates the dilemma where individual rationality leads to mutual defection despite mutual cooperation being better."
                },
                {
                    question: "What is Pareto Optimality?",
                    answers: [
                        "When all agents receive equal payoffs",
                        "An outcome where no other outcome makes everyone at least as well off and at least one player strictly better off",
                        "The outcome with the highest total payoff",
                        "When the Nash Equilibrium is reached"
                    ],
                    correct: 1,
                    explanation: "A Pareto optimal outcome cannot be improved without hurting at least one player. It's the best solution for the group. However, Nash equilibrium is not always Pareto optimal (as in Prisoner's Dilemma)."
                },
                {
                    question: "In Axelrod's Iterated Prisoner's Dilemma tournament, which strategy won?",
                    answers: [
                        "Always Defect (ALLD)",
                        "Tit for Tat (first cooperate, then replicate opponent's previous move)",
                        "Random",
                        "Always Cooperate"
                    ],
                    correct: 1,
                    explanation: "Tit for Tat by Anatol Rapoport won both tournaments. It cooperates first, then punishes betrayal but forgives. This represents optimal behavior in permanent conflict: cooperate a priori, punish betrayal, forgive if partner returns to cooperation."
                },
                {
                    question: "What is the fundamental problem illustrated by the Tragedy of the Commons?",
                    answers: [
                        "Resources are always scarce",
                        "Individual self-interest leads to depletion/spoiling of shared resources",
                        "Public ownership is inefficient",
                        "Commons should be privatized"
                    ],
                    correct: 1,
                    explanation: "In commons, benefits are individual but costs are shared by all. Interest of taking from commons always exceeds cost to pay for using them. This leads to free rider problem where users act in self-interest, overusing/depleting the resource. Solutions: top-down rules, privatization, or local management (Ostrom)."
                },
                {
                    question: "Why is cooperation rational in the infinitely iterated Prisoner's Dilemma but not in a known finite iteration?",
                    answers: [
                        "Because players get tired in finite games",
                        "Because in infinite iteration future encounters matter, but in finite iteration backward induction leads to defection in last round",
                        "Because the payoffs change over time",
                        "Because players can communicate in infinite games"
                    ],
                    correct: 1,
                    explanation: "In infinitely iterated PD, future encounters always matter so cooperation is rational. In known finite iteration, backward induction applies: in last round, rational to defect (no future), so knowing this, defect in second-to-last, etc., leading to defection in all rounds."
                },
                {
                    question: "What does game theory assume about rationality?",
                    answers: [
                        "Agents act randomly",
                        "Each player tries to maximize their individual utility (economic rationality)",
                        "Players always cooperate",
                        "Players minimize their opponent's utility"
                    ],
                    correct: 1,
                    explanation: "Game theory assumes economic rationality: agents make decisions to maximize their expected utility/gains, try to anticipate other's strategy, in a game defined by common rules setting expected gains and losses."
                }
            ],
            communication: [
                {
                    question: "What are the FIVE elements of Shannon & Weaver's transmission model of communication?",
                    answers: [
                        "Speaker, Listener, Message, Context, Feedback",
                        "Information source, Transmitter, Channel, Receiver, Destination",
                        "Sender, Encoder, Medium, Decoder, Receiver",
                        "Agent, Message, Protocol, Response, Acknowledgment"
                    ],
                    correct: 1,
                    explanation: "The five elements are: (1) Information source (produces message), (2) Transmitter (encodes message into signal), (3) Channel (adapted to transmit signals), (4) Receiver (decodes message from signal), (5) Destination (gets message)."
                },
                {
                    question: "What is the difference between intentional and incidental communication?",
                    answers: [
                        "Intentional is verbal, incidental is non-verbal",
                        "Intentional has fixed meaning with sender's intent, incidental has receiver-dependent meaning with no intentional sender meaning",
                        "Intentional is between agents, incidental is via environment",
                        "Intentional is digital, incidental is analog"
                    ],
                    correct: 1,
                    explanation: "Intentional communication: fixed meaning, shared semantics needed, sender intends the meaning. Incidental communication: receiver-dependent meaning, message is a signal with no intentional sender meaning, receiver interprets/gives meaning."
                },
                {
                    question: "According to Austin's Speech Act Theory, what are the THREE levels of analysis?",
                    answers: [
                        "Syntax, Semantics, Pragmatics",
                        "Locutionary act (utterance), Illocutionary act (intent), Perlocutionary act (result)",
                        "Encoding, Transmission, Decoding",
                        "Message, Meaning, Effect"
                    ],
                    correct: 1,
                    explanation: "Speech acts analyzed on 3 levels: (1) Locutionary act - actual performance (phonetic, syntactic, semantic aspects) = utterance; (2) Illocutionary act - intended meaning = intent; (3) Perlocutionary act - actual effect, whether intended or not = result."
                },
                {
                    question: "What are Searle's FIVE categories of illocutionary acts?",
                    answers: [
                        "Questions, Commands, Statements, Requests, Promises",
                        "Assertives, Commissives, Directives, Declaratives, Expressives",
                        "Inform, Request, Promise, Query, Confirm",
                        "Perception, Analysis, Disambiguation, Incorporation, Response"
                    ],
                    correct: 1,
                    explanation: "Searle's 5 categories: (1) Assertives - commit to truth of proposition; (2) Commissives - commit to future action; (3) Directives - cause hearer to take action; (4) Declaratives - change reality; (5) Expressives - express attitudes/emotions."
                },
                {
                    question: "What are the THREE dimensions on which trust is based according to the course?",
                    answers: [
                        "Experience, Reputation, Intuition",
                        "Sincerity (won't lie), Competence (can do/knows what it says), Benevolence (willing to help)",
                        "Reliability, Security, Availability",
                        "Honesty, Ability, Integrity"
                    ],
                    correct: 1,
                    explanation: "Trust based on: (1) Sincerity - will not lie, intends to do what it promises, believes what it says; (2) Competence - can do what it promises, knows what it says; (3) Benevolence - is willing to help."
                },
                {
                    question: "What is the difference between trust and reputation?",
                    answers: [
                        "Trust is public, reputation is private",
                        "Trust is an individual belief based on direct experience, reputation is common knowledge without direct experience",
                        "Trust is emotional, reputation is rational",
                        "Trust is short-term, reputation is long-term"
                    ],
                    correct: 1,
                    explanation: "Trust: belief of an individual about another's capability, based on past actions through direct experience (A trusts B about X). Reputation: common knowledge about an individual without direct experience, image a group has of an individual (in group G, A has good/bad reputation)."
                },
                {
                    question: "In mentalist ACL semantics (FIPA-ACL), what are the preconditions and effects of inform(i,j,p)?",
                    answers: [
                        "i must have p, j will execute p",
                        "Preconditions: i believes p is true, i believes j is interested. Effects: j believes p (if trust in i's sincerity and competence)",
                        "i sends p, j receives p",
                        "i knows p, j learns p"
                    ],
                    correct: 1,
                    explanation: "Inform(i,j,p) - Preconditions: i believes p is true, i believes j is interested in p. Effects (rational effect): j believes p (if j trusts i's sincerity - i actually believes p, and competence - if i believes p then p might be true). Also: j believes that i believes p, j believes that i wants j to believe p."
                },
                {
                    question: "What is the Contract-Net protocol and what are its 5 stages?",
                    answers: [
                        "A negotiation protocol with offer, counter-offer, acceptance, execution, payment",
                        "Task allocation in 5 stages: Recognition, Announcement, Bidding, Awarding, Expediting",
                        "A communication protocol with request, process, respond, acknowledge, close",
                        "A coordination method with planning, delegation, execution, monitoring, completion"
                    ],
                    correct: 1,
                    explanation: "Contract-Net is a task allocation protocol with 5 stages: (1) Recognition - agent recognizes need for help; (2) Announcement - sends task specification; (3) Bidding - capable/willing agents bid; (4) Awarding - manager chooses among bids, communicates result; (5) Expediting - may involve sub-contracts."
                }
            ],
            abms: [
                {
                    question: "What is the key difference between Agent-Based Modeling and classical mathematical modeling?",
                    answers: [
                        "ABMS is faster to compute",
                        "ABMS simulates interactions between heterogeneous agents to observe macro-level emergence, classical uses equations for homogeneous behavior",
                        "ABMS is always more accurate",
                        "ABMS requires less data"
                    ],
                    correct: 1,
                    explanation: "ABMS: simulates interactions between (heterogeneous) agents, system-level patterns emerge from micro-level interactions, finer-grained. Classical: equations express relations between system components, homogeneous behavior, aggregated macroscopic level, faster for large populations."
                },
                {
                    question: "According to Axelrod, what are the 7 goals of simulation?",
                    answers: [
                        "Speed, Accuracy, Efficiency, Reliability, Scalability, Security, Maintainability",
                        "Prediction, Task performance, Training, Entertainment, Education, Proof, Discovery",
                        "Modeling, Testing, Analysis, Validation, Deployment, Monitoring, Optimization",
                        "Data collection, Processing, Analysis, Visualization, Reporting, Documentation, Archiving"

        let currentTopic = 'all';

        let totalCount = 0;
        let answered = false;

        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function startGame(topic) {
            currentTopic = topic;
            currentQuestionIndex = 0;
            score = 0;
            correctCount = 0;
            totalCount = 0;
            
            if (topic === 'all') {
                currentQuestions = [];
                for (let key in questions) {
                    currentQuestions = currentQuestions.concat(questions[key]);
                }
                currentQuestions = shuffleArray(currentQuestions).slice(0, 20);
            } else {
                currentQuestions = shuffleArray(questions[topic]);
            }
            
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('questionArea').style.display = 'block';
            document.getElementById('results').style.display = 'none';
            
            updateStats();
            showQuestion();
        }

        function showQuestion() {
            if (currentQuestionIndex >= currentQuestions.length) {
                showResults();
                return;
            }

            answered = false;
            const question = currentQuestions[currentQuestionIndex];
            
            document.getElementById('questionNumber').textContent = 
                `Question ${currentQuestionIndex + 1} of ${currentQuestions.length}`;
            
            const topicNames = {
                intro: 'Introduction',
                architectures: 'Architectures',
                gametheory: 'Game Theory',
                communication: 'Communication',
                abms: 'ABMS',
                planning: 'Planning',
                coordination: 'Coordination',
                socialchoice: 'Social Choice'
            };
            
            document.getElementById('topicLabel').textContent = 
                currentTopic === 'all' ? 'Mixed Topics' : topicNames[currentTopic];
            
            document.getElementById('questionText').textContent = question.question;
            
            const answersArea = document.getElementById('answersArea');
            answersArea.innerHTML = '';
            
            question.answers.forEach((answer, index) => {
                const button = document.createElement('button');
                button.className = 'answer-button';
                button.textContent = answer;
                button.onclick = () => checkAnswer(index);
                answersArea.appendChild(button);
            });
            
            document.getElementById('feedback').style.display = 'none';
            document.getElementById('nextButton').style.display = 'none';
            
            const progress = ((currentQuestionIndex) / currentQuestions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function checkAnswer(selectedIndex) {
            if (answered) return;
            answered = true;
            totalCount++;
            
            const question = currentQuestions[currentQuestionIndex];
            const buttons = document.querySelectorAll('.answer-button');
            const feedback = document.getElementById('feedback');
            const feedbackText = document.getElementById('feedbackText');
            const explanation = document.getElementById('explanation');
            
            buttons.forEach(button => button.disabled = true);
            
            if (selectedIndex === question.correct) {
                score += 10;
                correctCount++;
                buttons[selectedIndex].classList.add('correct');
                feedback.className = 'feedback correct';
                feedbackText.innerHTML = '✓ Correct! Well done!';
            } else {
                buttons[selectedIndex].classList.add('incorrect');
                buttons[question.correct].classList.add('correct');
                feedback.className = 'feedback incorrect';
                feedbackText.innerHTML = '✗ Incorrect. The correct answer is highlighted.';
            }
            
            explanation.textContent = question.explanation;
            feedback.style.display = 'block';
            document.getElementById('nextButton').style.display = 'block';
            
            updateStats();
        }

        function nextQuestion() {
            currentQuestionIndex++;
            showQuestion();
        }

        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('correct').textContent = correctCount;
            document.getElementById('total').textContent = totalCount;
        }

        function showResults() {
            document.getElementById('questionArea').style.display = 'none';
            document.getElementById('results').style.display = 'block';
            
            const percentage = totalCount > 0 ? Math.round((correctCount / totalCount) * 100) : 0;
            document.getElementById('finalScore').textContent = `${percentage}%`;
            
            let message = '';
            if (percentage >= 90) {
                message = '🌟 Outstanding! You\'ve mastered the material!';
            } else if (percentage >= 75) {
                message = '🎯 Great job! You have a solid understanding!';
            } else if (percentage >= 60) {
                message = '👍 Good work! Keep studying to improve!';
            } else {
                message = '📚 Keep practicing! Review the lectures again!';
            }
            
            document.getElementById('resultMessage').textContent = 
                `${message}\n\nYou got ${correctCount} out of ${totalCount} questions correct.`;
        }
